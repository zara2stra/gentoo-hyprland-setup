program_options:
  automount: true
  notify: true
  tray: false
  file_manager: thunar
  terminal: kitty

notifications:
  device_mounted: 5
  device_unmounted: 3
  device_added: 3
  device_removed: 3
  device_unlocked: 3
  device_locked: 3
  job_failed: 8
  timeout: 5

icon_names:
  media: ['drive-removable-media-usb', 'drive-removable-media']
  mount: ['object-select']
  unmount: ['media-eject']
  unlock: ['changes-allow']
  lock: ['changes-prevent']
  eject: ['media-eject']
  detach: ['drive-removable-media']
  quit: ['application-exit']
  submenu: ['go-next']
