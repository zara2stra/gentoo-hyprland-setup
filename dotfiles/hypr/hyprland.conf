monitor=,preferred,auto,1

$terminal = kitty
$browser = brave-browser-stable
$filemanager = thunar
$menu = rofi -show drun -show-icons

exec-once = /usr/libexec/hyprpolkitagent &
exec-once = mako &
exec-once = waybar &
exec-once = hyprpaper &
exec-once = hypridle &
exec-once = thunar --daemon &
exec-once = udiskie &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

general {
    border_size = 0
    gaps_in = 4
    gaps_out = 4
    resize_on_border = true
    extend_border_grab_area = 30
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 4
    active_opacity = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = easeOutBack, 0.34, 1.56, 0.64, 1.0
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    animation = windows, 1, 5, easeOutBack, popin 80%
    animation = windowsOut, 1, 4, easeOutExpo, popin 80%
    animation = layers, 1, 4, easeOutExpo, fade
    animation = layersIn, 1, 4, easeOutExpo, fade
    animation = layersOut, 1, 3, easeOutExpo, fade
    animation = fade, 1, 4, easeOutExpo
    animation = workspaces, 1, 5, easeOutExpo, slide
    animation = specialWorkspaceIn, 1, 5, easeOutBack, fade
    animation = specialWorkspaceOut, 1, 4, easeOutExpo, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    focus_on_activate = true
    font_family = JetBrains Mono
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

input {
    kb_layout = us, ru
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
    accel_profile = flat
}

gesture = 3, horizontal, workspace

$mainMod = SUPER

# App launchers
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, F, exec, $browser
bind = $mainMod, E, exec, $filemanager
bind = $mainMod, C, exec, ~/.config/hypr/scripts/clipboard.sh

# Window management
bind = ALT, F4, killactive,
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod, G, fullscreen, 0
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit

# Session
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, M, exec, ~/.config/hypr/scripts/power-menu.sh

# Focus movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Window movement
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# Resize
binde = $mainMod SHIFT, left, resizeactive, -50 0
binde = $mainMod SHIFT, right, resizeactive, 50 0
binde = $mainMod SHIFT, up, resizeactive, 0 -50
binde = $mainMod SHIFT, down, resizeactive, 0 50

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse workspace switching
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse window control
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Alt+Tab window switcher
bind = ALT, TAB, exec, rofi -show window -show-icons

# Media controls
bindl = $mainMod, SPACE, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Volume with notification feedback
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -t 1000 -h string:x-canonical-private-synchronous:volume "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{printf "%.0f%%", $2*100}')"
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -t 1000 -h string:x-canonical-private-synchronous:volume "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{printf "%.0f%%", $2*100}')"
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && notify-send -t 1000 -h string:x-canonical-private-synchronous:volume "Volume" "Mute toggled"
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness with notification feedback
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ && notify-send -t 1000 -h string:x-canonical-private-synchronous:brightness "Brightness" "$(brightnessctl -m | cut -d, -f4)"
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- && notify-send -t 1000 -h string:x-canonical-private-synchronous:brightness "Brightness" "$(brightnessctl -m | cut -d, -f4)"

# Screenshots
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh
bind = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh --edit
bind = SUPER, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full
bind = SUPER SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full --edit

windowrule = suppress_event maximize, match:class .*
misc {
    force_default_wallpaper = 0  # Set to 1 to enable the anime mascot wallpapers
    disable_hyprland_logo = false # Set to false to allow the logo/anime girl to render
}   



windowrule = match:title bluetui, float on, size 700 500, center on
