general {
    grace = 5
    hide_cursor = true
}

background {
    path = screenshot
    blur_passes = 3
    blur_size = 6
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    color = rgb(1e1e2e)
}

input-field {
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(89b4fa)
    inner_color = rgb(313244)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 14
    check_color = rgb(a6e3a1)
    fail_color = rgb(f38ba8)
    fail_text = <i>$FAIL</i>
    position = 0, -50
    halign = center
    valign = center
}

label {
    text = $TIME
    color = rgb(89b4fa)
    font_size = 72
    font_family = JetBrains Mono
    position = 0, 120
    halign = center
    valign = center
}

label {
    text = cmd[update:3600000] echo "$(date '+%A, %B %d')"
    color = rgb(a6adc8)
    font_size = 18
    font_family = JetBrains Mono
    position = 0, 50
    halign = center
    valign = center
}
